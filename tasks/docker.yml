---
- name: docker | Assert supported OS family
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Debian'
    fail_msg: "This role supports Debian/Ubuntu only (got {{ ansible_facts['os_family'] }})."
  tags:
    - docker
    - system

- name: docker | Install dependencies
  ansible.builtin.apt:
    state: present
    update_cache: true
    cache_valid_time: 3600
    name:
      - apt-transport-https
  tags:
    - docker
    - system

- name: docker | Set DEB architecture
  ansible.builtin.set_fact:
    deb_architecture: "{{ deb_arch_map[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}"
  vars:
    deb_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf
  tags:
    - docker

- name: "docker | Ensure {{ docker_key_dir | regex_replace('/+$', '') }}"
  ansible.builtin.file:
    state: directory
    owner: root
    group: root
    dest: "{{ docker_key_dir | regex_replace('/+$', '') }}"
    mode: "0755"
  tags:
    - docker

- name: "docker | Add Docker archive key: {{ docker_key_path }}"
  ansible.builtin.get_url:
    url: "{{ docker_key_url }}"
    dest: "{{ docker_key_path }}"
    mode: "0644"
    owner: root
    group: root
  tags:
    - docker

- name: docker | Add Docker repository
  ansible.builtin.deb822_repository:
    name: docker
    state: present
    install_python_debian: true
    types: deb
    uris: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}"
    suites: "{{ ansible_facts['distribution_release'] | lower }}"
    components: stable
    architectures: "{{ deb_architecture }}"
    signed_by: "{{ docker_key_path }}"
  notify: Docker | Update apt cache
  tags:
    - docker

- name: docker | Flush handlers before installing packages
  ansible.builtin.meta: flush_handlers
  tags:
    - docker

- name: docker | Install packages
  ansible.builtin.apt:
    state: "{{ docker_pkg_state }}"
    cache_valid_time: 3600
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - docker-buildx-plugin
  tags:
    - docker

- name: docker | Set Docker service state
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  tags:
    - docker
